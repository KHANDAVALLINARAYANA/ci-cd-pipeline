name: CI Package Embedded Config

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your specific repository
      - name: Checkout ci-cd-pipeline repository
        uses: actions/checkout@v3
        with:
          repository: KHANDAVALLINARAYANA/ci-cd-pipeline
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-cd-pipeline

      # Step 2: Setup Java 21 (matches your pom.xml)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      # Step 3: Build with embedded config
      - name: Build with embedded YAML
        run: |
          cd ci-cd-pipeline
          mvn clean package -Pembedded-config

      # Step 4: Upload artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: user4-app-artifact
          path: ci-cd-pipeline/target/*.jar