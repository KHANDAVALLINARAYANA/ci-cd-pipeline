name: CI Package External Config

on:
  push:
    branches: [main]  # triggers on push to main branch

jobs:
  build-external:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup JDK 21 (matches your pom.xml)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      # Step 3: Build Spring Boot app without internal YAMLs
      - name: Build without embedded config
        run: mvn clean package -Pexternal-config

      # Step 4: Smoke test external config
      - name: Smoke test external config
        run: |
          java -jar target/*.jar --spring.config.location=file:./config-templates/application-local.yaml &
          APP_PID=$!
          sleep 15
          curl -f http://localhost:8080/actuator/health
          kill $APP_PID

      # Step 5: Upload the built artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: user4-app-artifact
          path: target/*.jar