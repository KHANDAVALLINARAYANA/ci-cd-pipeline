name: CI Package External Config

on:
  push:
    branches: [main]

jobs:
  build-external:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Build without internal YAML
        run: mvn clean package -Pno-embedded-config

      - name: Smoke test external config
        run: |
          java -jar target/*.jar --spring.config.location=file:./config/local.yaml &
          sleep 15
          curl http://localhost:8080/actuator/health

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-artifact
          path: target/*.jar