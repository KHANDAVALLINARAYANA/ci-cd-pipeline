server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://prod-db-server:3306/user_prod_db
    username: prod_user
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    change-log: classpath:dbchangelog/db.changelog-master.xml
logging:
  level:
    root: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info