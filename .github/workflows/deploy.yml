name: Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target Environment (LOCAL, DEV, TEST, PROD)'
        required: true
        default: DEV

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup JDK 21
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # REQUIRED
          java-version: '21'
          cache: 'maven'

      # Step 3: Select environment config file
      - name: Select environment config
        run: |
          if [ "${{ github.event.inputs.env }}" == "DEV" ]; then
            CONFIG=config-templates/application-dev.yaml
          elif [ "${{ github.event.inputs.env }}" == "TEST" ]; then
            CONFIG=config-templates/application-test.yaml
          elif [ "${{ github.event.inputs.env }}" == "PROD" ]; then
            CONFIG=config-templates/application-prod.yaml
          else
            CONFIG=config-templates/application-local.yaml
          fi
          echo "Using config $CONFIG"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV

      # Step 4: Deploy the artifact
      - name: Run Spring Boot app
        run: |
          java -jar target/*.jar --spring.config.location=file:$CONFIG &
          APP_PID=$!
          echo "Spring Boot started with PID $APP_PID"